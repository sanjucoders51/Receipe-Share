<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RecipeShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body>
  <div class="auth-container">
    <div class="navbar__logo" style="justify-content: center; margin-bottom: 2rem; color: white;">
      <a href="index.html" class="navbar__logo"> 
        <span class="navbar__logo-icon">🍳</span>
        <span>Recipe<span style="color: var(--accent-start);">Share</span></span>
      </a>
    </div>
    <div class="auth-card">
      <h1>Create an Account</h1>
      
      <div id="success-banner" class="success-banner">
        Account created! Redirecting to login…
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter a username">
          <div class="error-message" id="username-error"></div>
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email">
          <div class="error-message" id="email-error"></div>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password">
          <button type="button" class="password-toggle" data-target="password"></button>
          <div class="error-message" id="password-error"></div>
        </div>
        

        
        <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
        
        <div class="auth-links">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/utils/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setupPasswordToggles();

      const form = document.getElementById('register-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset errors
        document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
        
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        let isValid = true;
        
        // Validation
        if (!username) {
          showError('username-error', 'Username is required');
          isValid = false;
        }
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email || !emailRegex.test(email)) {
          showError('email-error', 'Please enter a valid email address');
          isValid = false;
        }
        
        if (!password || password.length < 8) {
          showError('password-error', 'Password must be at least 8 characters long');
          isValid = false;
        }
        

        
        if (isValid) {
          try {
            const response = await fetch(`${API_BASE}/register`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, email, password })
            });
            
            const data = await response.json();
            if (!response.ok) {
              showError('username-error', data.error || 'Registration failed');
              return;
            }
            
            // Show success and redirect
            const banner = document.getElementById('success-banner');
            banner.style.display = 'block';
            form.style.display = 'none';
            
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 2000);
          } catch (e) {
            showError('username-error', 'An error occurred during registration. Please try again later.');
          }
        }
      });
      
      function showError(id, message) {
        const errorEl = document.getElementById(id);
        errorEl.textContent = message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
