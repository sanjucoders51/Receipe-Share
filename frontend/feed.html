<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Feed - RecipeShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body>
  <div class="app-container">
    <button class="mobile-menu-btn" id="mobile-menu-btn">Menu</button>
    <aside class="sidebar" id="sidebar">
      <!-- Sidebar populated by JS -->
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Recipe Explorer</h1>
      </div>

      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Search recipes by title...">
      </div>

      <div class="recipe-grid" id="feed-grid">
        <!-- Recipes populated by JS -->
      </div>
    </main>
  </div>

  <script src="assets/utils/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      renderSidebar('feed');
      
      const feedGrid = document.getElementById('feed-grid');
      const searchInput = document.getElementById('search-input');
      
      let allRecipes = [];
      
      function renderRecipes(recipes) {
        if (recipes.length === 0) {
          feedGrid.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
              <p>No recipes found matching your search.</p>
            </div>
          `;
          return;
        }

        feedGrid.innerHTML = recipes.map(recipe => {
          let thumbUrl = '';
          if (recipe.media && recipe.media.length > 0) thumbUrl = recipe.media[0];
          else if (recipe.steps && recipe.steps.length > 0 && recipe.steps[0].imageUrl) thumbUrl = recipe.steps[0].imageUrl;

          if (!thumbUrl && !recipe.videoUrl) thumbUrl = getPlaceholderImage();

          return `
          <div class="recipe-card">
            <div class="recipe-image-placeholder">
              ${thumbUrl ? `<img src="${thumbUrl}" alt="${recipe.title}" style="width:100%;height:100%;object-fit:cover;">` : (recipe.videoUrl ? '🎬 Video Content' : 'No Media')}
            </div>
            <div class="recipe-content">
              <h3 class="recipe-title">${recipe.title}</h3>
              <p class="recipe-author">by ${recipe.user ? recipe.user.username : 'Unknown'}</p>
              <p class="recipe-desc">${(recipe.description || '').substring(0, 100)}${(recipe.description || '').length > 100 ? '...' : ''}</p>
              <div class="recipe-actions">
                <button class="btn-primary" onclick="window.location.href='recipe-details.html?id=${recipe.id}'">View</button>
              </div>
            </div>
          </div>
          `;
        }).join('');
      }
      
      try {
        allRecipes = await apiFetch('/recipes');
        renderRecipes(allRecipes);
      } catch (e) {
        console.error('Failed to fetch feed recipes:', e);
        feedGrid.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><p>Failed to load recipes.</p></div>';
      }
      
      // Real-time search filter
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allRecipes.filter(recipe => 
          recipe.title.toLowerCase().includes(query)
        );
        renderRecipes(filtered);
      });
    });
  </script>
</body>
</html>
